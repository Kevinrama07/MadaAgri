version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: madaagri-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: madaagri
      MYSQL_USER: madaagri_user
      MYSQL_PASSWORD: madaagri_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/backend/database/madaagri.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/backend/database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - madaagri-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache (pour sessions et cache)
  redis:
    image: redis:7-alpine
    container_name: madaagri-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - madaagri-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: madaagri-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      HOST: 0.0.0.0
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: madaagri_user
      DB_PASSWORD: madaagri_pass
      DB_NAME: madaagri
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_secret_change_in_production_min_32_chars
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000
      LOG_LEVEL: debug
    volumes:
      - ./src/backend:/app
      - /app/node_modules
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - madaagri-network
    command: npm run dev

  # Frontend Web
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: madaagri-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_WS_URL: ws://localhost:4000
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - madaagri-network
    command: npm run dev

  # Nginx Reverse Proxy (optionnel pour dev)
  nginx:
    image: nginx:alpine
    container_name: madaagri-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend
    networks:
      - madaagri-network

  # Adminer (interface MySQL)
  adminer:
    image: adminer:latest
    container_name: madaagri-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    networks:
      - madaagri-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  madaagri-network:
    driver: bridge
